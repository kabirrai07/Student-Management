<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - Management System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body style="align-items: flex-start; padding-top: 50px;">
    <div class="container">
        <div class="nav">
            <div>
                <h2 style="margin:0;">Attendance Panel <span class="badge">Teacher</span></h2>
                <p style="color:var(--text-dim)">Welcome, {{ session['full_name'] }}</p>
            </div>
            <a href="{{ url_for('logout') }}" class="logout-link">Logout</a>
        </div>

        <div class="glass-card" style="margin-bottom: 30px;">
            <h3>New Student Registration</h3>
            <form action="{{ url_for('add_student') }}" method="POST"
                style="display: flex; gap: 15px; margin-top: 20px;">
                <input type="text" name="name" placeholder="Student Full Name" required>
                <button type="submit" style="margin-top:0; width: 200px;">Register Student</button>
            </form>
        </div>

        <div class="glass-card">
            <h3>Mark Daily Attendance</h3>
            <form action="{{ url_for('mark_attendance') }}" method="POST">
                <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
                    <label style="margin:0">Select Date:</label>
                    <input type="date" name="date" required style="width: 200px;">
                </div>

                <table>
                    <thead>
                        <tr>
                            <th>Student Name</th>
                            <th>Total Absents</th>
                            <th>Status (Present/Absent)</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for student in students %}
                        <tr>
                            <td>{{ student.name }}</td>
                            <td><span class="badge" style="background: var(--error);">{{ student.total_absences
                                    }}</span></td>
                            <td>
                                <div style="display: flex; gap: 20px;">
                                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                        <input type="radio" name="status_{{ student.id }}" value="Present" required
                                            style="width: auto;"> Present
                                    </label>
                                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                        <input type="radio" name="status_{{ student.id }}" value="Absent" required
                                            style="width: auto;"> Absent
                                    </label>
                                </div>
                            </td>
                            <td>
                                <div style="display: flex; flex-direction: column; gap: 5px;">
                                    <a href="{{ url_for('student_details', id=student.id) }}"
                                        style="color: var(--accent); text-decoration: none; font-size: 0.8rem;">View
                                        Analytics</a>
                                    <div style="display: flex; gap: 10px;">
                                        <a href="{{ url_for('edit_student', id=student.id) }}"
                                            style="color: var(--primary); text-decoration: none; font-size: 0.8rem;">Edit</a>
                                        <a href="{{ url_for('delete_student', id=student.id) }}"
                                            style="color: var(--error); text-decoration: none; font-size: 0.8rem;"
                                            onclick="return confirm('Delete student history?')">Delete</a>
                                    </div>
                                </div>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
                <button type="submit" style="margin-top: 20px;">Save Attendance</button>
            </form>
        </div>
    </div>
</body>

</html>
