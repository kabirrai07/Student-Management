<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Teacher - Admin Panel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="container" style="max-width: 500px;">
        <div class="glass-card">
            <h2>Edit Teacher</h2>
            <form action="{{ url_for('edit_teacher', username=teacher.username) }}" method="POST">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" name="full_name" value="{{ teacher.full_name }}" required>
                </div>
                <div class="input-group">
                    <label>Username (Static)</label>
                    <input type="text" value="{{ teacher.username }}" disabled>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" name="password" value="{{ teacher.password }}" required>
                </div>
                <button type="submit">Update Teacher</button>
                <a href="{{ url_for('admin_dashboard') }}"
                    style="display:block; text-align:center; margin-top:15px; color:var(--text-dim); text-decoration:none;">Cancel</a>
            </form>
        </div>
    </div>
</body>

</html>
