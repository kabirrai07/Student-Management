<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Management System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body style="align-items: flex-start; padding-top: 50px;">
    <div class="container">
        <div class="nav">
            <div>
                <h2 style="margin:0;">Dashboard <span class="badge">Admin</span></h2>
                <p style="color:var(--text-dim)">Welcome, {{ session['full_name'] }}</p>
            </div>
            <a href="{{ url_for('logout') }}" class="logout-link">Logout</a>
        </div>

        <div class="glass-card" style="margin-bottom: 30px;">
            <h3>Register New Teacher</h3>
            <form action="{{ url_for('register_teacher') }}" method="POST"
                style="display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 15px; margin-top: 20px;">
                <input type="text" name="full_name" placeholder="Full Name" required>
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit" style="margin-top:0">Add Teacher</button>
            </form>
        </div>

        <div class="glass-card">
            <h3>Active Teachers</h3>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Username</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for teacher in teachers %}
                    <tr>
                        <td>{{ teacher.full_name }}</td>
                        <td>{{ teacher.username }}</td>
                        <td>
                            <a href="{{ url_for('edit_teacher', username=teacher.username) }}"
                                style="color: var(--primary); text-decoration: none; margin-right: 15px;">Edit</a>
                            <a href="{{ url_for('delete_teacher', username=teacher.username) }}"
                                style="color: var(--error); text-decoration: none;"
                                onclick="return confirm('Delete this teacher?')">Delete</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
