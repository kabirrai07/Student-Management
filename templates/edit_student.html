<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student - Teacher Panel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="container" style="max-width: 500px;">
        <div class="glass-card">
            <h2>Edit Student</h2>
            <form action="{{ url_for('edit_student', id=student.id) }}" method="POST">
                <div class="input-group">
                    <label>Student Full Name</label>
                    <input type="text" name="name" value="{{ student.name }}" required>
                </div>
                <button type="submit">Update Student</button>
                <a href="{{ url_for('teacher_dashboard') }}"
                    style="display:block; text-align:center; margin-top:15px; color:var(--text-dim); text-decoration:none;">Cancel</a>
            </form>
        </div>
    </div>
</body>

</html>
